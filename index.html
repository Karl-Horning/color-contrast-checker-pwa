    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <meta
            name="description"
            content="Validate WCAG 2.1 & 2.2 color contrast ratios for AA & AAA compliance. A fast, PWA-ready tool by Karl Horning for accessible web design."
        />
        <link rel="icon" href="icons/icon-192.png" />
        <link
            rel="canonical"
            href="https://www.karlhorning.dev/color-contrast-checker-pwa/"
        />
        <meta
            name="apple-mobile-web-app-title"
            content="Color Contrast Checker"
        />
        <meta
            name="theme-color"
            content="#ffffff"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#0f172a"
            media="(prefers-color-scheme: dark)"
        />

        <meta
            name="google-site-verification"
            content="IVOf_8bN_5RT2xDdzbjb4LHjhlnFdp-yBkV4VSzKMWI"
        />

        <!-- iOS Add-to-Home-Screen helpers -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta
            name="apple-mobile-web-app-title"
            content="Color Contrast Checker"
        />
        <link rel="apple-touch-icon" href="icons/icon-192.png" />

        <!-- manifest path relative to this page (resolves under /color-contrast-checker-pwa/) -->
        <link rel="manifest" href="manifest.webmanifest" />

        <title>Color Contrast Checker | Karl Horning</title>

        <!-- 1) Set the theme class ASAP (blocking, no async/defer) -->
        <script>
            (function () {
                try {
                    const stored = localStorage.getItem("theme");
                    const prefersDark = window.matchMedia(
                        "(prefers-color-scheme: dark)"
                    ).matches;
                    const dark = stored ? stored === "dark" : prefersDark;
                    const c = document.documentElement.classList;
                    if (dark) c.add("dark");
                    else c.remove("dark");
                } catch {}
            })();
        </script>

        <!-- 2) Minimal fallback colors to prevent flash before Tailwind loads -->
        <style>
            html.dark body {
                background: #0f172a;
                color: #f1f5f9;
            }
            html:not(.dark) body {
                background: #f8fafc;
                color: #0f172a;
            }
        </style>
